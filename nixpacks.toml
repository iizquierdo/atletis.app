# Monorepo defaults for Railway/Nixpacks. Override per service in the Railway dashboard:
#
# API service
#   Build:  pnpm install && pnpm build:api
#   Start:  pnpm start:api
#
# Web service
#   Build:  pnpm install && pnpm build:web
#   Start:  pnpm start:web
#
# Landing service (static marketing site)
#   Build:  pnpm install && pnpm build:landing
#   Start:  pnpm start:landing
#
# Root Directory for ALL services must be the repo root (not apps/*), so the
# pnpm workspace install + filters resolve correctly.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm i -g corepack", "corepack enable", "pnpm install --frozen-lockfile"]
