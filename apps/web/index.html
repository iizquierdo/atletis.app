<!DOCTYPE html>
<html class="h-full" lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinapsis CRM/ERP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
  <style>
    .dark body {
      background-color: hsl(240 10% 4%);
    }
  </style>
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('vite-theme') || localStorage.getItem('theme') || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDarkMode = theme === 'dark' || (theme === 'system' && prefersDark);
        if (isDarkMode) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>

<body class="text-foreground bg-background flex h-full overflow-hidden text-base antialiased">
  <div class="flex grow" id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
